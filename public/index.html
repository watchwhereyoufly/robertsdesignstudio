<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roberts Design Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: linear-gradient(135deg, #D63B1A 0%, #E84420 25%, #F4A261 60%, #FAFAFA 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 70%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
      border-radius: 50%;
    }

    body::after {
      content: '';
      position: absolute;
      top: 10%;
      left: -5%;
      width: 50%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(196,149,106,0.3) 0%, transparent 70%);
      border-radius: 50%;
    }

    .gridlines {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      -webkit-mask-image: radial-gradient(ellipse 100% 120% at 0% 100%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 25%, rgba(0,0,0,0) 45%);
      mask-image: radial-gradient(ellipse 100% 120% at 0% 100%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 25%, rgba(0,0,0,0) 45%);
    }

    .gridlines .vline {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255,255,255,0.35);
    }

    .gridlines .hline {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.35);
    }

    .topline {
      position: absolute;
      top: 40px;
      left: 40px;
      z-index: 3;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .topline strong {
      color: rgba(255,255,255,0.7);
      display: block;
      margin-bottom: 4px;
      letter-spacing: 3px;
    }

    .svg-draw {
      position: relative;
      z-index: 2;
      width: min(70vw, 900px);
      height: auto;
      opacity: 0.95;
    }

    .svg-draw path,
    .svg-draw polygon {
      fill: rgba(255,255,255,0.08);
      stroke: rgba(255,255,255,0.4);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes draw {
      0% { stroke-dashoffset: var(--dash); }
      40% { stroke-dashoffset: 0; }
      60% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: var(--dash); }
    }

    @media (max-width: 768px) {
      .svg-draw { width: 85vw; }
      .topline { top: 24px; left: 24px; font-size: 9px; letter-spacing: 2px; }
      .topline strong { letter-spacing: 2px; }
      .gridlines { display: none; }
    }

    @media (max-width: 480px) {
      .svg-draw { width: 95vw; }
      .topline { top: 20px; left: 20px; font-size: 8px; }
    }
  </style>
</head>
